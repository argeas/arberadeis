services:
  arber:
    build: ./backend
    ports:
      - "8020:8000"
    env_file:
      - .env
    volumes:
      - arber-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  arber-data:
